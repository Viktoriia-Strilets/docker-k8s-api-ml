apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  namespace: kubeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi
        image: docker.io/library/my_app-web:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DATABASE_URL
          value: postgresql://postgres:Pq!10gMz@db:5432/todo_db
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-svc
  namespace: kubeflow
spec:
  selector:
    app: fastapi
  ports:
  - port: 8000
    targetPort: 8000