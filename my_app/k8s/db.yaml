apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: kubeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: Pq!10gMz
        - name: POSTGRES_DB
          value: todo_db
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: kubeflow
spec:
  selector:
    app: db
  ports:
  - port: 5432